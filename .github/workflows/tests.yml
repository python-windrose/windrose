name: Tests

# no permissions by default
permissions: {}

on:
  pull_request:
  push:
    branches: [main]

jobs:
  run:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]
        os: [ ubuntu-latest ]
        include:
          - os: windows-latest
            python-version: "3.14"
          - os: macos-latest
            python-version: "3.14"
      fail-fast: false
    defaults:
      run:
        shell: bash -l {0}

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Setup Micromamba for Python ${{ matrix.python-version }}
      uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3.0.0
      with:
        environment-name: TEST
        init-shell: bash
        create-args: >-
          python=${{ matrix.python-version }} pip
          --file requirements.txt
          --file requirements-dev.txt
          --channel conda-forge

    - name: Install windrose
      run: |
        python -m pip install -e . --no-deps --force-reinstall

    - name: Tests
      run: |
        pytest -s -rxs -vv -Werror tests/ --mpl --mpl-generate-summary=html \
        --mpl-results-path="windrose_test_output-${{ matrix.os }}-${{ matrix.python-version }}"
    - name: Store mpl-results
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
      if: failure()
      with:
        name: "windrose_test_output-${{ matrix.os }}-${{ matrix.python-version }}"
        path: "windrose_test_output-${{ matrix.os }}-${{ matrix.python-version }}"
        retention-days: 1
